name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npx @vscode/vsce package --out noname-extension-helper.vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: noname-extension-helper.vsix
          generate_release_notes: true
